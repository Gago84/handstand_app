name: handstand_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.2.2+30 # Subscription restore fix

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  youtube_player_flutter: ^9.1.3
  video_player: ^2.10.0
  flutter_cache_manager: ^3.4.1
  cloud_firestore: ^6.1.3
  firebase_core: ^4.5.0
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0
  shared_preferences: ^2.2.2
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+11
  url_launcher: ^6.3.2
  upgrader: ^13.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/front-por.jpg
    - assets/icon-android banner.png
    - assets/icon-android.png
    - assets/icon.png
    - assets/side-land.jpg
    - assets/side-por.jpg
